apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projects
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/grzesiek2115/MyPlatform.git
    targetRevision: main
    path: argocd/projects
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
