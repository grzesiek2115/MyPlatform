apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  destination:
    namespace: grafana
    server: https://kubernetes.default.svc
  project: monitoring-stack
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: 12.4.3
    helm:
      values: |
        adminPassword: admin

        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
          datasources:
            enabled: true
            searchNamespace: ALL

        dashboards:
          default:
            kubernetes-cluster:
              gnetId: 7249
              revision: 1
              datasource: Prometheus
            node-exporter:
              gnetId: 1860
              revision: 37
              datasource: Prometheus
            kubernetes-pods:
              gnetId: 6781
              revision: 1
              datasource: Prometheus
            loki-logs:
              gnetId: 13639
              revision: 2
              datasource: Loki
            kepler-energy:
              gnetId: 16280
              revision: 1
              datasource: Prometheus
            opencost:
              gnetId: 15661
              revision: 1
              datasource: Prometheus
            argocd:
              gnetId: 14584
              revision: 1
              datasource: Prometheus
            kubernetes-cluster-monitoring:
              gnetId: 6417
              revision: 1
              datasource: Prometheus
            website-monitoring:
              gnetId: 13041
              revision: 4
              datasource: Prometheus

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: Kubernetes
                type: file
                disableDeletion: true
                editable: false
                options:
                  path: /var/lib/grafana/dashboards/default

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-operated.monitoring.svc.cluster.local:9090
                isDefault: true
              - name: Loki
                type: loki
                url: http://loki.loki.svc.cluster.local:3100
              - name: Tempo
                type: tempo
                url: http://tempo.tempo.svc.cluster.local:3100
              - name: Pyroscope
                type: grafana-pyroscope-datasource
                url: http://pyroscope.pyroscope.svc.cluster.local:4040

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
