apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  destination:
    namespace: grafana
    server: https://kubernetes.default.svc
  project: monitoring-stack
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 12.4.3
    helm:
      values: |
        adminPassword: admin

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-operated.monitoring.svc.cluster.local:9090
                isDefault: true
              - name: Loki
                type: loki
                url: http://loki.loki.svc.cluster.local:3100
              - name: Tempo
                type: tempo
                url: http://tempo.tempo.svc.cluster.local:3100

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
